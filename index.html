<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Media Converter - FFmpeg.wasm Local</title>
  </head>
  <body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-6">
    
    <div class="max-w-3xl w-full bg-gray-800 rounded-2xl shadow-2xl p-8 border border-gray-700">
      <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white mb-2">Media Converter Local</h1>
        <p class="text-gray-400">Convierte video o audio 100% local en tu navegador con FFmpeg.wasm</p>
      </header>

      <!-- Zona Drag & Drop / Input -->
      <div id="drop-zone" class="border-2 border-dashed border-gray-600 rounded-xl p-10 flex flex-col items-center justify-center text-center cursor-pointer hover:border-blue-500 hover:bg-gray-750 transition-colors duration-200">
        <svg class="w-12 h-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        <p class="text-lg font-medium text-gray-300">Arrastra tu archivo aquí</p>
        <p class="text-sm text-gray-500 mt-1">o haz clic para seleccionar</p>
        <input type="file" id="file-input" class="hidden" />
      </div>

      <!-- Detalles del archivo cargado (Oculto inicialmente) -->
      <div id="file-details" class="hidden mt-6 bg-gray-700 p-4 rounded-lg flex items-center justify-between">
        <div class="flex items-center space-x-3 overflow-hidden">
          <svg class="w-8 h-8 flex-shrink-0 text-blue-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
          <div class="overflow-hidden">
            <p id="file-name" class="text-sm font-medium text-white truncate"></p>
            <p id="file-size" class="text-xs text-gray-400"></p>
          </div>
        </div>
        <button id="btn-remove-file" class="text-red-400 hover:text-red-300 p-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>

      <!-- Configuración de conversión (Oculto inicialmente) -->
      <div id="conversion-settings" class="hidden mt-8 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Formato de salida -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Formato de Salida</label>
            <select id="output-format" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <optgroup label="Video">
                <option value="mp4">MP4</option>
                <option value="webm">WebM</option>
                <option value="mkv">MKV</option>
                <option value="avi">AVI</option>
              </optgroup>
              <optgroup label="Audio (Extraer/Convertir)">
                <option value="mp3">MP3</option>
                <option value="wav">WAV</option>
                <option value="aac">AAC</option>
                <option value="ogg">OGG</option>
              </optgroup>
            </select>
          </div>

          <!-- Calidad -->
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Calidad (Downgrade)</label>
            <select id="quality-preset" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="high">Alta (Original o similar)</option>
              <option value="medium">Media (Equilibrado)</option>
              <option value="low">Baja (Menor peso)</option>
              <option value="custom">Personalizada...</option>
            </select>
          </div>
        </div>

        <!-- Ajustes Personalizados (Ocultos a menos que se elija 'custom') -->
        <div id="custom-settings" class="hidden bg-gray-700 p-4 rounded-lg grid grid-cols-1 md:grid-cols-3 gap-4 border border-gray-600">
          <div>
             <label class="block text-xs font-medium text-gray-400 mb-1">Resolución (Ej: 1280x720)</label>
             <input type="text" id="custom-resolution" placeholder="Dejar vacío = Original" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-1.5 text-sm text-white focus:ring-1 focus:ring-blue-500">
          </div>
          <div>
             <label class="block text-xs font-medium text-gray-400 mb-1">Video Bitrate (Ej: 1000k)</label>
             <input type="text" id="custom-vbitrate" placeholder="Dejar vacío = Auto" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-1.5 text-sm text-white focus:ring-1 focus:ring-blue-500">
          </div>
          <div>
             <label class="block text-xs font-medium text-gray-400 mb-1">Audio Bitrate (Ej: 128k)</label>
             <input type="text" id="custom-abitrate" placeholder="Dejar vacío = Auto" class="w-full bg-gray-800 border border-gray-600 rounded px-3 py-1.5 text-sm text-white focus:ring-1 focus:ring-blue-500">
          </div>
        </div>

        <button id="btn-convert" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors flex justify-center items-center">
          Convertir Archivo
        </button>
      </div>

      <!-- Estado / Progreso de la conversión -->
      <div id="progress-container" class="hidden mt-8 text-center">
        <p id="progress-text" class="text-sm font-medium text-blue-400 mb-2">Inicializando...</p>
        <div class="w-full bg-gray-700 rounded-full h-2.5 mb-4 overflow-hidden">
          <div id="progress-bar" class="bg-blue-500 h-2.5 rounded-full" style="width: 0%"></div>
        </div>
      </div>

      <!-- Botón de Descarga / Resultado -->
      <div id="result-container" class="hidden mt-8 flex flex-col items-center">
        <p class="text-green-400 font-medium mb-4">¡Conversión completada!</p>
        <a id="btn-download" href="#" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition-colors flex items-center space-x-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          <span>Descargar Archivo</span>
        </a>
      </div>

    </div>

    <!-- Mensaje de Carga Inicial de FFmpeg -->
    <div id="initial-loading" class="fixed inset-0 bg-gray-900 bg-opacity-90 flex flex-col items-center justify-center z-50 hidden">
      <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-blue-500 mb-4"></div>
      <p class="text-white text-lg font-medium">Cargando motor FFmpeg.wasm...</p>
      <p class="text-gray-400 text-sm mt-2">Esto puede tomar unos segundos la primera vez.</p>
    </div>

    <!-- Contenedor de notificaciones Toast -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
